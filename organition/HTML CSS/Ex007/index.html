<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principais tipos de formatação</title>
</head>
<body>
    <h1>Principais tipos:</h1>
        <h2>Negrito/Italico</h2>
        <p>Para criar um testo em <b>negrito se usa a tag b</b>(nao semantica)</p>
        <p>Para criar um testo em <i>italico se usa a tag i</i>(nao semantica)</p>

        <p>Dica: Use control + Shift + P para abrir o menu de comandos rapido (parecido com o obsidian)</p>
    
</body>
</html>
