<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><u>Trabalhando com Listas</u></title>
</head>
<body>
  <h1><u>Listas Ordenadas</u></h1>  
  <ol type="I"> <!-- type="I" para números romanos, A para letras a minusculo  -->
    <li>Acordar</li>
    <li>Tomar café</li>
    <li>Ir para o trabalho</li>
  </ol>
    <h1><u>Listas Não Ordenadas</u></h1>
    <ul> <!-- ul para listas não ordenadas, Disk bolinha preta preenchida, circle uma bolinha vazia, square uma caixa vazia -->
      <li>Pão</li>
      <li>Leite</li>
      <li>Ovos</li>
      <li>Frutas</li>
    </ul>
</body>
</html>
