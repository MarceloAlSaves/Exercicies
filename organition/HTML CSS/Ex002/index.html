<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragrafos</title>
</head>
<body>
    <h1>Parágrafos e quebras de linhas.</h1>
    <hr>
    <p>Voce pode escrever os parágrafos de qualquer jeito se tiver no meio de setas e parágrafos.</p>
    <p>Se precisar quebrar a posse de uma linha espécifica<br> como este voce pode usar a tag br</p>
    <se></se>
    <!--- LESS THAN/GREATER THAN -->
    <p>Para usar caracteres especiais como:
        &cent;
        &euro;
        &copy;
        &reg;
            &trade;
    </p>
    <p>Para usar o emoji:
    &#x1F596;
    </p>
</body>
</html>
